
services:
  # 1. PostgreSQL Servisi - Kullanıcı ve log veritabanı
  postgres:
    image: postgres:18-alpine  
    container_name: s3m_nac_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # Kendi bilgisayarımızdan DBeaver/DataGrip ile bağlanabilmek için
    volumes: 
      - postgres_data:/var/lib/postgresql/data # Verilerin silinmemesi için kalıcı disk alanı
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # init.sql için
    networks: 
      - nac_network
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Servisi - Oturum önbelleği ve rate-limit
  #Brute-force saldırılarına karşı Rate-Limiting sayacını ve anlık aktif kullanıcıları tutan yüksek hızlı RAM önbelleğimiz.
  redis:
    image: redis:8-alpine  
    container_name: s3m_nac_redis
    ports:
      - "6379:6379"
    volumes:  
      - redis_data:/data
    networks: 
      - nac_network
    healthcheck:  
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  # 3. API Servisimiz (Karar Motoru)
  api:
    # Bu sefer "image" kullanmıyoruz. "build: ./api" diyerek 
    # "Git api klasörünün içindeki Dockerfile tarifini oku ve kendi imajını kendin üret" diyoruz.
    build: ./api 
    container_name: s3m_nac_api
    
    # Kendi bilgisayarımızdaki 8000 portunu, API'nin 8000 portuna bağlıyoruz.
    ports:
      - "8000:8000"
      
    # Sen kodlarını değiştirip kaydettikçe konteyneri kapatıp açmana gerek kalmasın diye 
    # kendi api klasörünü, konteynerin içindeki /app klasörüne canlı olarak bağlıyoruz.
    volumes:
      - ./api:/app
      
    # Veritabanlarına bağlanabilmesi için aynı ağda olmalı.
    networks:
      - nac_network
      
    # depends_on: "Önce postgres ve redis tamamen ayağa kalksın, API ondan sonra çalışsın" kuralı.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# YENİ EKLENDİ: API'nin kesin çalışan /users adresine Python ile ping atıyoruz
    healthcheck: 
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/users')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

# 4. RADIUS Sunucusu (Kapıdaki Güvenlik Görevlimiz)
  freeradius:
    #image: freeradius/freeradius-server:latest-3.2 # Ödevde istenen sürüm
    build: ./freeradius # Artık image değil, kendi klasörümüzü derliyoruz
    container_name: s3m_nac_freeradius
    ports:
      - "1812:1812/udp" # Authentication (Kimlik Doğrulama) portu
      - "1813:1813/udp" # Accounting (Loglama) portu
#    volumes: # YENİ EKLENEN KISIM
#      - ./freeradius/rest:/etc/raddb/mods-enabled/rest
#      - ./freeradius/default:/etc/raddb/sites-enabled/default  
    networks:
      - nac_network
    depends_on:
      api:
        condition: service_healthy

# Ortak Kullanılacak Disk Alanları ve Ağ Tanımı
volumes:
  postgres_data:
  redis_data:

networks:
  nac_network:
    driver: bridge # Servislerin birbirini container adlarıyla (örn: postgres) bulmasını sağlar